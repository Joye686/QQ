<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>桑基图 - 客户选择 vs 实际发出</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📊 客户选择 → 实际发出 流向图</h2>
        <canvas id="sankey" width="800" height="500"></canvas>
    </div>
    <script>
        const canvas = document.getElementById('sankey');
        const ctx = canvas.getContext('2d');
        
        // 数据
        const data = {
            left: {
                fast: { label: '快线', value: 62, y: 150 },
                slow: { label: '慢线', value: 38, y: 300 }
            },
            right: {
                fast: { label: '快线', value: 58, y: 150 },
                slow: { label: '慢线', value: 42, y: 300 }
            },
            flows: [
                { from: 'fast', to: 'fast', value: 55, color: '#1890ff' },
                { from: 'fast', to: 'slow', value: 4, color: '#ff7a45' },
                { from: 'slow', to: 'fast', value: 1, color: '#52c41a' },
                { from: 'slow', to: 'slow', value: 35, color: '#1890ff' }
            ]
        };
        
        const leftX = 200;
        const rightX = 600;
        const nodeWidth = 80;
        const nodeHeight = 120;
        
        // 清空画布
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 绘制标题
        ctx.fillStyle = '#666';
        ctx.font = '16px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('客户选择', leftX + nodeWidth/2, 100);
        ctx.fillText('实际发出', rightX + nodeWidth/2, 100);
        
        // 绘制节点
        function drawNode(x, y, label, value, isLeft) {
            // 节点背景
            const gradient = ctx.createLinearGradient(x, y, x + nodeWidth, y + nodeHeight);
            gradient.addColorStop(0, '#e6f7ff');
            gradient.addColorStop(1, '#1890ff');
            ctx.fillStyle = gradient;
            
            // 圆角矩形
            ctx.beginPath();
            ctx.roundRect(x, y, nodeWidth, nodeHeight, 8);
            ctx.fill();
            
            // 文字
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(label, x + nodeWidth/2, y + nodeHeight/2 - 10);
            ctx.font = '16px -apple-system, sans-serif';
            ctx.fillText(value + '%', x + nodeWidth/2, y + nodeHeight/2 + 15);
        }
        
        // 绘制左侧节点
        drawNode(leftX, data.left.fast.y - nodeHeight/2, '快线', '62%', true);
        drawNode(leftX, data.left.slow.y - nodeHeight/2, '慢线', '38%', true);
        
        // 绘制右侧节点
        drawNode(rightX, data.right.fast.y - nodeHeight/2, '快线', '58%', false);
        drawNode(rightX, data.right.slow.y - nodeHeight/2, '慢线', '42%', false);
        
        // 绘制流向（贝塞尔曲线）
        function drawFlow(fromY, toY, value, color, label) {
            const fromX = leftX + nodeWidth;
            const toX = rightX;
            
            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            
            // 控制点
            const cp1x = fromX + (toX - fromX) / 2;
            const cp1y = fromY;
            const cp2x = toX - (toX - fromX) / 2;
            const cp2y = toY;
            
            ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, toX, toY);
            
            // 线条样式
            ctx.strokeStyle = color;
            ctx.lineWidth = Math.max(2, value * 0.8);
            ctx.lineCap = 'round';
            ctx.stroke();
            
            // 标签
            if (label) {
                const midX = (fromX + toX) / 2;
                const midY = (fromY + toY) / 2;
                ctx.fillStyle = color;
                ctx.font = 'bold 13px -apple-system, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(label, midX, midY - 8);
            }
        }
        
        // 绘制各条流向
        drawFlow(data.left.fast.y, data.right.fast.y, 55, '#1890ff', '55%');
        drawFlow(data.left.fast.y + 30, data.right.slow.y - 20, 4, '#ff7a45', '4%');
        drawFlow(data.left.slow.y - 30, data.right.fast.y + 20, 1, '#52c41a', '1%');
        drawFlow(data.left.slow.y, data.right.slow.y, 35, '#1890ff', '35%');
        
        // 底部注释
        ctx.fillStyle = '#999';
        ctx.font = '13px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('降档 4%  |  提档 1%', canvas.width/2, 470);
    </script>
</body>
</html>
