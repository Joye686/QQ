<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 分包分析看板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        .update-time {
            font-size: 0.9em;
            opacity: 0.8;
            margin-top: 10px;
        }
        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .kpi-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .kpi-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .kpi-card.warning {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
        }
        .kpi-card.success {
            background: linear-gradient(135deg, #51cf66, #40c057);
            color: white;
        }
        .kpi-card.info {
            background: linear-gradient(135deg, #4dabf7, #339af0);
            color: white;
        }
        .kpi-value {
            font-size: 2.2em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .kpi-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        .kpi-sub {
            font-size: 0.8em;
            opacity: 0.8;
            margin-top: 5px;
        }
        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .chart-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .chart-container {
            height: 300px;
            width: 100%;
        }
        /* Table */
        .table-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #667eea;
            color: white;
            font-weight: 600;
        }
        tr:hover {
            background: #f8f9fa;
        }
        .cost-waste {
            color: #e03131;
            font-weight: bold;
        }
        /* Full width chart */
        .full-width {
            grid-column: 1 / -1;
        }
        /* Responsive */
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .kpi-value {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 分包分析看板</h1>
            <p>订单拆分监控与物流成本优化分析</p>
            <div class="update-time" id="updateTime">数据更新时间：--</div>
        </div>

        <!-- KPI Cards -->
        <div class="kpi-grid">
            <div class="kpi-card info">
                <div class="kpi-value" id="kpi-orders">0</div>
                <div class="kpi-label">订单数</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value" id="kpi-packages">0</div>
                <div class="kpi-label">总包裹数</div>
            </div>
            <div class="kpi-card warning">
                <div class="kpi-value" id="kpi-split-orders">0</div>
                <div class="kpi-label">被拆分订单数</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value" id="kpi-ratio">0</div>
                <div class="kpi-label">包裹拆分比</div>
                <div class="kpi-sub">包裹数/订单数</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value" id="kpi-avg-items">0</div>
                <div class="kpi-label">平均包单件</div>
                <div class="kpi-sub">件数/包裹数</div>
            </div>
            <div class="kpi-card warning">
                <div class="kpi-value" id="kpi-split-rate">0%</div>
                <div class="kpi-label">分包率</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-value" id="kpi-total-cost">¥0</div>
                <div class="kpi-label">总物流成本</div>
            </div>
            <div class="kpi-card warning">
                <div class="kpi-value" id="kpi-waste">¥0</div>
                <div class="kpi-label">成本浪费</div>
                <div class="kpi-sub">可优化空间</div>
            </div>
        </div>

        <!-- Charts -->
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">📊 拆分原因分布</div>
                <div class="chart-container" id="chart-reason"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">🏭 仓库分包情况</div>
                <div class="chart-container" id="chart-warehouse"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">📦 包裹数分布</div>
                <div class="chart-container" id="chart-package-dist"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">💰 成本对比分析</div>
                <div class="chart-container" id="chart-cost"></div>
            </div>
            <div class="chart-card full-width">
                <div class="chart-title">📈 日趋势分析</div>
                <div class="chart-container" id="chart-trend"></div>
            </div>
        </div>

        <!-- Top Waste Table -->
        <div class="table-card">
            <div class="chart-title">⚠️ 成本浪费 TOP 订单</div>
            <table>
                <thead>
                    <tr>
                        <th>订单号</th>
                        <th>商品件数</th>
                        <th>包裹数</th>
                        <th>物流成本</th>
                        <th>理论最优</th>
                        <th>浪费金额</th>
                        <th>拆分原因</th>
                    </tr>
                </thead>
                <tbody id="waste-table">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 模拟数据 - 后续可替换为 API 获取
        const mockData = [
            { orderNo: "ORD20260301001", date: "2026-03-01", items: 5, packages: 1, isSplit: false, cost: 12.5, optimalCost: 12.5, waste: 0, reason: "", warehouse: "华东仓", customerLevel: "VIP", sku: "SKU-A001" },
            { orderNo: "ORD20260301002", date: "2026-03-01", items: 8, packages: 2, isSplit: true, cost: 28, optimalCost: 18, waste: 10, reason: "库存不足", warehouse: "华东仓", customerLevel: "普通", sku: "SKU-B002" },
            { orderNo: "ORD20260301003", date: "2026-03-01", items: 3, packages: 3, isSplit: true, cost: 45, optimalCost: 15, waste: 30, reason: "客户催发", warehouse: "华南仓", customerLevel: "VIP", sku: "SKU-C003" },
            { orderNo: "ORD20260301004", date: "2026-03-02", items: 2, packages: 1, isSplit: false, cost: 10, optimalCost: 10, waste: 0, reason: "", warehouse: "华北仓", customerLevel: "普通", sku: "SKU-D004" },
            { orderNo: "ORD20260301005", date: "2026-03-02", items: 10, packages: 4, isSplit: true, cost: 52, optimalCost: 22, waste: 30, reason: "仓库调拨", warehouse: "华东仓", customerLevel: "普通", sku: "SKU-E005" },
            { orderNo: "ORD20260301006", date: "2026-03-03", items: 6, packages: 2, isSplit: true, cost: 24, optimalCost: 16, waste: 8, reason: "库存不足", warehouse: "华南仓", customerLevel: "VIP", sku: "SKU-F006" },
            { orderNo: "ORD20260301007", date: "2026-03-03", items: 4, packages: 1, isSplit: false, cost: 14, optimalCost: 14, waste: 0, reason: "", warehouse: "华北仓", customerLevel: "普通", sku: "SKU-G007" },
            { orderNo: "ORD20260301008", date: "2026-03-04", items: 12, packages: 3, isSplit: true, cost: 42, optimalCost: 25, waste: 17, reason: "客户催发", warehouse: "华东仓", customerLevel: "普通", sku: "SKU-H008" },
            { orderNo: "ORD20260301009", date: "2026-03-04", items: 2, packages: 2, isSplit: true, cost: 22, optimalCost: 10, waste: 12, reason: "库存不足", warehouse: "华南仓", customerLevel: "VIP", sku: "SKU-I009" },
            { orderNo: "ORD20260301010", date: "2026-03-05", items: 7, packages: 1, isSplit: false, cost: 18, optimalCost: 18, waste: 0, reason: "", warehouse: "华北仓", customerLevel: "普通", sku: "SKU-J010" }
        ];

        // 计算 KPI
        function calculateKPIs() {
            const totalOrders = mockData.length;
            const totalPackages = mockData.reduce((sum, o) => sum + o.packages, 0);
            const totalItems = mockData.reduce((sum, o) => sum + o.items, 0);
            const splitOrders = mockData.filter(o => o.isSplit).length;
            const totalCost = mockData.reduce((sum, o) => sum + o.cost, 0);
            const totalOptimal = mockData.reduce((sum, o) => sum + o.optimalCost, 0);
            const totalWaste = mockData.reduce((sum, o) => sum + o.waste, 0);

            return {
                orders: totalOrders,
                packages: totalPackages,
                splitOrders: splitOrders,
                ratio: (totalPackages / totalOrders).toFixed(2),
                avgItems: (totalItems / totalPackages).toFixed(1),
                splitRate: ((splitOrders / totalOrders) * 100).toFixed(0),
                totalCost: totalCost.toFixed(1),
                waste: totalWaste.toFixed(1),
                wasteRate: ((totalWaste / totalCost) * 100).toFixed(1)
            };
        }

        // 更新 KPI 显示
        function updateKPIs() {
            const kpis = calculateKPIs();
            document.getElementById('kpi-orders').textContent = kpis.orders;
            document.getElementById('kpi-packages').textContent = kpis.packages;
            document.getElementById('kpi-split-orders').textContent = kpis.splitOrders;
            document.getElementById('kpi-ratio').textContent = kpis.ratio;
            document.getElementById('kpi-avg-items').textContent = kpis.avgItems;
            document.getElementById('kpi-split-rate').textContent = kpis.splitRate + '%';
            document.getElementById('kpi-total-cost').textContent = '¥' + kpis.totalCost;
            document.getElementById('kpi-waste').textContent = '¥' + kpis.waste;
            document.getElementById('updateTime').textContent = '数据更新时间：' + new Date().toLocaleString('zh-CN');
        }

        // 拆分原因分布
        function renderReasonChart() {
            const reasonCount = {};
            mockData.filter(o => o.isSplit).forEach(o => {
                reasonCount[o.reason] = (reasonCount[o.reason] || 0) + 1;
            });

            const chart = echarts.init(document.getElementById('chart-reason'));
            chart.setOption({
                tooltip: { trigger: 'item' },
                legend: { top: '0%', left: 'center' },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    avoidLabelOverlap: false,
                    itemStyle: {
                        borderRadius: 10,
                        borderColor: '#fff',
                        borderWidth: 2
                    },
                    label: { show: false, position: 'center' },
                    emphasis: {
                        label: { show: true, fontSize: 16, fontWeight: 'bold' }
                    },
                    data: Object.entries(reasonCount).map(([name, value]) => ({ name, value }))
                }]
            });
        }

        // 仓库分包情况
        function renderWarehouseChart() {
            const warehouseData = {};
            mockData.forEach(o => {
                if (!warehouseData[o.warehouse]) {
                    warehouseData[o.warehouse] = { total: 0, split: 0 };
                }
                warehouseData[o.warehouse].total++;
                if (o.isSplit) warehouseData[o.warehouse].split++;
            });

            const chart = echarts.init(document.getElementById('chart-warehouse'));
            chart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                legend: { data: ['总订单', '拆分订单'] },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'category', data: Object.keys(warehouseData) },
                yAxis: { type: 'value' },
                series: [
                    { name: '总订单', type: 'bar', data: Object.values(warehouseData).map(d => d.total) },
                    { name: '拆分订单', type: 'bar', data: Object.values(warehouseData).map(d => d.split) }
                ]
            });
        }

        // 包裹数分布
        function renderPackageDistChart() {
            const pkgCount = {};
            mockData.forEach(o => {
                pkgCount[o.packages] = (pkgCount[o.packages] || 0) + 1;
            });

            const chart = echarts.init(document.getElementById('chart-package-dist'));
            chart.setOption({
                tooltip: { trigger: 'axis' },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'category', data: Object.keys(pkgCount).map(k => k + '包') },
                yAxis: { type: 'value' },
                series: [{
                    type: 'bar',
                    data: Object.values(pkgCount),
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#667eea' },
                            { offset: 1, color: '#764ba2' }
                        ])
                    }
                }]
            });
        }

        // 成本对比
        function renderCostChart() {
            const kpis = calculateKPIs();
            const chart = echarts.init(document.getElementById('chart-cost'));
            chart.setOption({
                tooltip: { trigger: 'item' },
                series: [{
                    type: 'gauge',
                    startAngle: 180,
                    endAngle: 0,
                    min: 0,
                    max: 100,
                    splitNumber: 5,
                    itemStyle: { color: '#e03131' },
                    progress: { show: true, width: 30 },
                    pointer: { show: false },
                    axisLine: { lineStyle: { width: 30 } },
                    axisTick: { show: false },
                    splitLine: { length: 15, lineStyle: { width: 2, color: '#999' } },
                    axisLabel: { distance: 40, fontSize: 12 },
                    detail: {
                        valueAnimation: true,
                        fontSize: 30,
                        offsetCenter: [0, '20%'],
                        formatter: '浪费率 {value}%'
                    },
                    data: [{ value: kpis.wasteRate }]
                }]
            });
        }

        // 日趋势
        function renderTrendChart() {
            const dateData = {};
            mockData.forEach(o => {
                if (!dateData[o.date]) {
                    dateData[o.date] = { orders: 0, split: 0, waste: 0 };
                }
                dateData[o.date].orders++;
                if (o.isSplit) dateData[o.date].split++;
                dateData[o.date].waste += o.waste;
            });

            const dates = Object.keys(dateData).sort();
            const chart = echarts.init(document.getElementById('chart-trend'));
            chart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { data: ['订单数', '拆分订单', '成本浪费'] },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'category', data: dates },
                yAxis: { type: 'value' },
                series: [
                    { name: '订单数', type: 'line', data: dates.map(d => dateData[d].orders), smooth: true },
                    { name: '拆分订单', type: 'line', data: dates.map(d => dateData[d].split), smooth: true },
                    { name: '成本浪费', type: 'bar', data: dates.map(d => dateData[d].waste) }
                ]
            });
        }

        // 更新浪费 TOP 表格
        function updateWasteTable() {
            const sorted = [...mockData].filter(o => o.waste > 0).sort((a, b) => b.waste - a.waste).slice(0, 10);
            const tbody = document.getElementById('waste-table');
            tbody.innerHTML = sorted.map(o => `
                <tr>
                    <td>${o.orderNo}</td>
                    <td>${o.items}</td>
                    <td>${o.packages}</td>
                    <td>¥${o.cost}</td>
                    <td>¥${o.optimalCost}</td>
                    <td class="cost-waste">¥${o.waste}</td>
                    <td>${o.reason}</td>
                </tr>
            `).join('');
        }

        // 初始化
        function init() {
            updateKPIs();
            renderReasonChart();
            renderWarehouseChart();
            renderPackageDistChart();
            renderCostChart();
            renderTrendChart();
            updateWasteTable();

            // 响应式重绘
            window.addEventListener('resize', () => {
                echarts.getInstanceByDom(document.getElementById('chart-reason'))?.resize();
                echarts.getInstanceByDom(document.getElementById('chart-warehouse'))?.resize();
                echarts.getInstanceByDom(document.getElementById('chart-package-dist'))?.resize();
                echarts.getInstanceByDom(document.getElementById('chart-cost'))?.resize();
                echarts.getInstanceByDom(document.getElementById('chart-trend'))?.resize();
            });
        }

        init();
    </script>
</body>
</html>
