<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物流分析仪表板</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        /* 筛选器 */
        .filters {
            background: white;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .filter-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .filter-item label {
            font-weight: 600;
            color: #555;
            white-space: nowrap;
            font-size: 13px;
        }
        .filter-item select {
            padding: 6px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .filter-item select:hover, .filter-item select:focus {
            border-color: #667eea;
            outline: none;
        }
        
        /* 指标卡片 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .stat-value {
            font-size: 1.5em;
            font-weight: 700;
            color: #667eea;
        }
        .stat-label {
            color: #888;
            margin-top: 4px;
            font-size: 11px;
        }
        
        /* 图表网格 */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .chart-container.full-width {
            grid-column: 1 / -1;
        }
        .chart-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
        }
        .chart {
            width: 100%;
            height: 320px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.5em;
        }
        
        @media (max-width: 1400px) {
            .stats-row { grid-template-columns: repeat(4, 1fr); }
        }
        @media (max-width: 1024px) {
            .charts-grid { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 物流分析仪表板</h1>
        
        <div id="loading" class="loading">正在加载数据...</div>
        
        <div id="dashboard" style="display: none;">
            <!-- 筛选器 -->
            <div class="filters">
                <div class="filter-row">
                    <div class="filter-item">
                        <label>📅 时间:</label>
                        <select id="filter-time"><option value="all">全部</option></select>
                    </div>
                    <div class="filter-item">
                        <label>🌍 国家:</label>
                        <select id="filter-country" onchange="updateCharts()">
                            <option value="all">全部</option>
                            <option value="US">美国</option>
                            <option value="UK">英国</option>
                            <option value="AU">澳大利亚</option>
                            <option value="CA">加拿大</option>
                            <option value="OTHER">其他</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>🏭 发货仓库:</label>
                        <select id="filter-warehouse" onchange="updateCharts()">
                            <option value="all">全部</option>
                            <option value="jiaxing">嘉兴仓</option>
                            <option value="us">美国仓</option>
                            <option value="uk">英国仓</option>
                            <option value="ca">加拿大仓</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>📦 产品:</label>
                        <select id="filter-product" onchange="updateCharts()">
                            <option value="all">全部</option>
                            <option value="standard">Standard Shipping</option>
                            <option value="express">Express Shipping</option>
                            <option value="quickship">Quickship</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>💰 货币:</label>
                        <select id="filter-currency" onchange="updateCharts()">
                            <option value="USD">USD</option>
                            <option value="CNY">CNY</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>🏷️ 站点:</label>
                        <select id="filter-site" onchange="updateCharts()">
                            <option value="all">全部</option>
                            <option value="M">M</option>
                            <option value="W">W</option>
                            <option value="R">R</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>📋 订单类型:</label>
                        <select id="filter-order-type" onchange="updateCharts()">
                            <option value="all">全部发货</option>
                            <option value="partial">部分</option>
                            <option value="unshipped">未发货</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 指标卡片 -->
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-value" id="stat-price-kg">$0.00</div>
                    <div class="stat-label">单价/KG</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-price-pkg">$0.00</div>
                    <div class="stat-label">单价/包裹</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-packages">0</div>
                    <div class="stat-label">发货包裹数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-orders">0</div>
                    <div class="stat-label">订单数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-items-pkg">0.0</div>
                    <div class="stat-label">包单件</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-weight-pkg">0.0 kg</div>
                    <div class="stat-label">每包裹重量</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-logistics-ratio">0%</div>
                    <div class="stat-label">正向物流占收入比</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-total-logistics">$0</div>
                    <div class="stat-label">累计物流费</div>
                </div>
            </div>

            <!-- 图表 -->
            <div class="charts-grid">
                <!-- 订单结构 -->
                <div class="chart-container">
                    <div class="chart-title">📊 订单结构（显示占比，悬浮显示数量）- 订单口径</div>
                    <div id="order-structure-chart" class="chart"></div>
                </div>
                
                <!-- 发货仓库占比 -->
                <div class="chart-container">
                    <div class="chart-title">🏭 发货仓库占比（显示占比，悬浮显示数量）- 发货口径</div>
                    <div id="warehouse-ratio-chart" class="chart"></div>
                </div>
                
                <!-- 嘉兴仓分析 -->
                <div class="chart-container">
                    <div class="chart-title">📈 嘉兴仓 by 周/月（实物用折线图按所选期间展示）- 发货口径</div>
                    <div id="jiaxing-chart" class="chart"></div>
                </div>
                
                <!-- 海外仓分析 -->
                <div class="chart-container">
                    <div class="chart-title">🌍 海外仓 by 周/月（折线图展示）- 选项放在上面</div>
                    <div id="overseas-chart" class="chart"></div>
                </div>
                
                <!-- 赔偿金额 -->
                <div class="chart-container">
                    <div class="chart-title">💰 赔偿 - 金额（by 年累计）</div>
                    <div id="claim-amount-chart" class="chart"></div>
                </div>
                
                <!-- 赔偿数量 -->
                <div class="chart-container">
                    <div class="chart-title">📦 赔偿 - 数量（by 年累计）</div>
                    <div id="claim-quantity-chart" class="chart"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 模拟数据
        const mockData = {
            countries: ['美国', '英国', '加拿大', '澳大利亚', '其他'],
            orderStructure: [
                { country: '澳大利亚', full: 60.61, partial: 18.18, unshipped: 21.21 },
                { country: '加拿大', full: 79.69, partial: 7.81, unshipped: 12.50 },
                { country: '美国', full: 86.96, partial: 5.80, unshipped: 7.25 },
                { country: '英国', full: 81.08, partial: 8.11, unshipped: 10.81 },
                { country: '其他', full: 35.00, partial: 30.00, unshipped: 35.00 }
            ],
            warehouseRatio: [
                { country: '澳大利亚', jiaxing: 100, overseas: 0 },
                { country: '加拿大', jiaxing: 89.89, overseas: 10.11 },
                { country: '美国', jiaxing: 88.78, overseas: 11.22 },
                { country: '英国', jiaxing: 86.43, overseas: 13.57 },
                { country: '其他', jiaxing: 100, overseas: 0 }
            ],
            jiaxingMetrics: [
                { country: '美国', priceKg: 84.54, pricePkg: 57.03, itemsPkg: 2.49, kgPkg: 1.0 },
                { country: '英国', priceKg: 64.74, pricePkg: 33.20, itemsPkg: 2.07, kgPkg: 1.0 },
                { country: '加拿大', priceKg: 84.28, pricePkg: 38.26, itemsPkg: 2.60, kgPkg: 1.0 },
                { country: '澳大利亚', priceKg: 44.11, pricePkg: 30.43, itemsPkg: 2.20, kgPkg: 1.0 },
                { country: '其他', priceKg: 112.95, pricePkg: 62.14, itemsPkg: 2.11, kgPkg: 1.0 }
            ],
            overseasMetrics: [
                { country: '美国', priceKg: 74.05, pricePkg: 32.20, itemsPkg: 1.40, kgPkg: 1.0 },
                { country: '英国', priceKg: 56.02, pricePkg: 18.51, itemsPkg: 1.15, kgPkg: 1.0 },
                { country: '加拿大', priceKg: 87.92, pricePkg: 30.40, itemsPkg: 1.13, kgPkg: 1.0 },
                { country: '澳大利亚', priceKg: 0, pricePkg: 0, itemsPkg: 0, kgPkg: 0 },
                { country: '其他', priceKg: 0, pricePkg: 0, itemsPkg: 0, kgPkg: 0 }
            ],
            claimAmount: [
                { label: 'A', logisticsFee: 4000, cost: 4500, claim: 2000, ratio: 0.24 },
                { label: 'B', logisticsFee: 8000, cost: 3000, claim: 400, ratio: 0.05 },
                { label: 'C', logisticsFee: 20000, cost: 22500, claim: 5000, ratio: 0.12 },
                { label: 'D', logisticsFee: 120000, cost: 135000, claim: 7000, ratio: 0.03 }
            ],
            claimQuantity: [
                { label: 'A', packages: 10000, ratio: 0.05, claimPkg: 100, shipRatio: 0.01 },
                { label: 'B', packages: 50000, ratio: 0.04, claimPkg: 200, shipRatio: 0.004 },
                { label: 'C', packages: 60000, ratio: 0.08, claimPkg: 500, shipRatio: 0.008 },
                { label: 'D', packages: 100000, ratio: 0.20, claimPkg: 3000, shipRatio: 0.03 }
            ]
        };

        let charts = {};

        function init() {
            renderOrderStructure();
            renderWarehouseRatio();
            renderJiaxing();
            renderOverseas();
            renderClaimAmount();
            renderClaimQuantity();
            updateStats();
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            
            window.addEventListener('resize', () => {
                Object.values(charts).forEach(chart => chart.resize());
            });
        }

        function updateStats() {
            document.getElementById('stat-price-kg').textContent = '$2.45';
            document.getElementById('stat-price-pkg').textContent = '$5.67';
            document.getElementById('stat-packages').textContent = '12,458';
            document.getElementById('stat-orders').textContent = '8,234';
            document.getElementById('stat-items-pkg').textContent = '2.3';
            document.getElementById('stat-weight-pkg').textContent = '1.8 kg';
            document.getElementById('stat-logistics-ratio').textContent = '8.5%';
            document.getElementById('stat-total-logistics').textContent = '$70,542';
        }

        function updateCharts() {
            updateStats();
            // 实际应用中这里会过滤数据
        }

        function renderOrderStructure() {
            charts.orderStructure = echarts.init(document.getElementById('order-structure-chart'));
            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    formatter: '{b}<br/>{a0}: {c0}%<br/>{a1}: {c1}%<br/>{a2}: {c2}%'
                },
                legend: {
                    data: ['全部发货订单数', '部分发货订单数', '未发货订单数'],
                    bottom: 0,
                    textStyle: { fontSize: 11 }
                },
                grid: { left: '3%', right: '4%', bottom: '15%', top: '10%', containLabel: true },
                xAxis: {
                    type: 'value',
                    max: 100,
                    axisLabel: { formatter: '{value}%' }
                },
                yAxis: {
                    type: 'category',
                    data: mockData.countries.reverse(),
                    axisLabel: { fontSize: 11 }
                },
                series: [
                    {
                        name: '全部发货订单数',
                        type: 'bar',
                        stack: 'total',
                        data: mockData.orderStructure.map(d => d.full).reverse(),
                        itemStyle: { color: '#4285f4' }
                    },
                    {
                        name: '部分发货订单数',
                        type: 'bar',
                        stack: 'total',
                        data: mockData.orderStructure.map(d => d.partial).reverse(),
                        itemStyle: { color: '#ea4335' }
                    },
                    {
                        name: '未发货订单数',
                        type: 'bar',
                        stack: 'total',
                        data: mockData.orderStructure.map(d => d.unshipped).reverse(),
                        itemStyle: { color: '#9b59b6' }
                    }
                ]
            };
            charts.orderStructure.setOption(option);
        }

        function renderWarehouseRatio() {
            charts.warehouseRatio = echarts.init(document.getElementById('warehouse-ratio-chart'));
            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    formatter: '{b}<br/>嘉兴仓：{c0}%<br/>海外仓：{c1}%'
                },
                legend: {
                    data: ['嘉兴仓', '海外仓'],
                    bottom: 0,
                    textStyle: { fontSize: 11 }
                },
                grid: { left: '3%', right: '4%', bottom: '15%', top: '10%', containLabel: true },
                xAxis: {
                    type: 'value',
                    max: 100,
                    axisLabel: { formatter: '{value}%' }
                },
                yAxis: {
                    type: 'category',
                    data: mockData.countries.reverse(),
                    axisLabel: { fontSize: 11 }
                },
                series: [
                    {
                        name: '嘉兴仓',
                        type: 'bar',
                        stack: 'total',
                        data: mockData.warehouseRatio.map(d => d.jiaxing).reverse(),
                        itemStyle: { color: '#4285f4' }
                    },
                    {
                        name: '海外仓',
                        type: 'bar',
                        stack: 'total',
                        data: mockData.warehouseRatio.map(d => d.overseas).reverse(),
                        itemStyle: { color: '#ea4335' }
                    }
                ]
            };
            charts.warehouseRatio.setOption(option);
        }

        function renderJiaxing() {
            charts.jiaxing = echarts.init(document.getElementById('jiaxing-chart'));
            const option = {
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                legend: {
                    data: ['单价/KG', '单价/包裹', '包单件', 'KG/包裹'],
                    bottom: 0,
                    textStyle: { fontSize: 10 }
                },
                grid: { left: '3%', right: '4%', bottom: '15%', top: '10%', containLabel: true },
                xAxis: {
                    type: 'value',
                    axisLabel: { fontSize: 10 }
                },
                yAxis: {
                    type: 'category',
                    data: mockData.countries.reverse(),
                    axisLabel: { fontSize: 10 }
                },
                series: [
                    {
                        name: '单价/KG',
                        type: 'bar',
                        data: mockData.jiaxingMetrics.map(d => d.priceKg).reverse(),
                        itemStyle: { color: '#4285f4' }
                    },
                    {
                        name: '单价/包裹',
                        type: 'bar',
                        data: mockData.jiaxingMetrics.map(d => d.pricePkg).reverse(),
                        itemStyle: { color: '#ea4335' }
                    },
                    {
                        name: '包单件',
                        type: 'bar',
                        data: mockData.jiaxingMetrics.map(d => d.itemsPkg).reverse(),
                        itemStyle: { color: '#34a853' }
                    },
                    {
                        name: 'KG/包裹',
                        type: 'bar',
                        data: mockData.jiaxingMetrics.map(d => d.kgPkg).reverse(),
                        itemStyle: { color: '#fbbc04' }
                    }
                ]
            };
            charts.jiaxing.setOption(option);
        }

        function renderOverseas() {
            charts.overseas = echarts.init(document.getElementById('overseas-chart'));
            const option = {
                tooltip: { trigger: 'axis' },
                legend: {
                    data: ['单价/KG', '单价/包裹', '包单件', 'KG/包裹'],
                    bottom: 0,
                    textStyle: { fontSize: 10 }
                },
                grid: { left: '3%', right: '4%', bottom: '15%', top: '10%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: mockData.countries,
                    axisLabel: { fontSize: 10, rotate: 0 }
                },
                yAxis: { type: 'value', axisLabel: { fontSize: 10 } },
                series: [
                    {
                        name: '单价/KG',
                        type: 'line',
                        data: mockData.overseasMetrics.map(d => d.priceKg),
                        itemStyle: { color: '#4285f4' },
                        symbol: 'circle',
                        symbolSize: 6
                    },
                    {
                        name: '单价/包裹',
                        type: 'line',
                        data: mockData.overseasMetrics.map(d => d.pricePkg),
                        itemStyle: { color: '#ea4335' },
                        symbol: 'circle',
                        symbolSize: 6
                    },
                    {
                        name: '包单件',
                        type: 'line',
                        data: mockData.overseasMetrics.map(d => d.itemsPkg),
                        itemStyle: { color: '#34a853' },
                        symbol: 'circle',
                        symbolSize: 6
                    },
                    {
                        name: 'KG/包裹',
                        type: 'line',
                        data: mockData.overseasMetrics.map(d => d.kgPkg),
                        itemStyle: { color: '#fbbc04' },
                        symbol: 'circle',
                        symbolSize: 6
                    }
                ]
            };
            charts.overseas.setOption(option);
        }

        function renderClaimAmount() {
            charts.claimAmount = echarts.init(document.getElementById('claim-amount-chart'));
            const option = {
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                legend: {
                    data: ['需赔偿物流费', '需赔偿成本', '已赔偿', '覆盖率'],
                    bottom: 0,
                    textStyle: { fontSize: 10 }
                },
                grid: { left: '3%', right: '4%', bottom: '15%', top: '10%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: ['A', 'B', 'C', 'D'],
                    axisLabel: { fontSize: 10 }
                },
                yAxis: [
                    { type: 'value', name: '金额', axisLabel: { fontSize: 10 } },
                    { type: 'value', name: '比率', min: 0, max: 0.3, axisLabel: { formatter: '{value}%' }, splitLine: { show: false } }
                ],
                series: [
                    {
                        name: '需赔偿物流费',
                        type: 'bar',
                        data: mockData.claimAmount.map(d => d.logisticsFee),
                        itemStyle: { color: '#4285f4' }
                    },
                    {
                        name: '需赔偿成本',
                        type: 'bar',
                        data: mockData.claimAmount.map(d => d.cost),
                        itemStyle: { color: '#ea4335' }
                    },
                    {
                        name: '已赔偿',
                        type: 'bar',
                        data: mockData.claimAmount.map(d => d.claim),
                        itemStyle: { color: '#34a853' }
                    },
                    {
                        name: '覆盖率',
                        type: 'line',
                        yAxisIndex: 1,
                        data: mockData.claimAmount.map(d => d.ratio),
                        itemStyle: { color: '#fbbc04' },
                        symbol: 'circle',
                        symbolSize: 8,
                        label: { show: true, position: 'top', formatter: '{c}%', fontSize: 10 }
                    }
                ]
            };
            charts.claimAmount.setOption(option);
        }

        function renderClaimQuantity() {
            charts.claimQuantity = echarts.init(document.getElementById('claim-quantity-chart'));
            const option = {
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                legend: {
                    data: ['累计发货包裹数', '占全年发货包裹数比', '需赔偿包裹数', '需赔偿包裹占其发货比'],
                    bottom: 0,
                    textStyle: { fontSize: 9 }
                },
                grid: { left: '3%', right: '4%', bottom: '20%', top: '10%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: ['A', 'B', 'C', 'D'],
                    axisLabel: { fontSize: 10 }
                },
                yAxis: [
                    { type: 'value', name: '数量', axisLabel: { fontSize: 10 } },
                    { type: 'value', name: '比率', min: 0, max: 0.5, axisLabel: { formatter: '{value}' }, splitLine: { show: false } }
                ],
                series: [
                    {
                        name: '累计发货包裹数',
                        type: 'bar',
                        data: mockData.claimQuantity.map(d => d.packages),
                        itemStyle: { color: '#4285f4' }
                    },
                    {
                        name: '占全年发货包裹数比',
                        type: 'line',
                        yAxisIndex: 1,
                        data: mockData.claimQuantity.map(d => d.ratio),
                        itemStyle: { color: '#ea4335' },
                        symbol: 'circle',
                        symbolSize: 6,
                        label: { show: true, position: 'top', formatter: '{c}', fontSize: 9 }
                    },
                    {
                        name: '需赔偿包裹数',
                        type: 'bar',
