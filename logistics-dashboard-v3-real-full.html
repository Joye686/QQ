<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物流分析仪表板 v3 - 完整测试版</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1800px; margin: 0 auto; }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        /* 筛选器 */
        .filters {
            background: white;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .filter-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .filter-item label {
            font-weight: 600;
            color: #555;
            white-space: nowrap;
            font-size: 13px;
        }
        .filter-item select, .filter-item input {
            padding: 6px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
        }
        
        /* 指标卡片 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .stat-value {
            font-size: 1.3em;
            font-weight: 700;
            color: #667eea;
        }
        .stat-label {
            color: #888;
            margin-top: 4px;
            font-size: 11px;
        }
        
        /* 图表容器 */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }
        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .chart-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
        }
        .chart {
            width: 100%;
            height: 300px;
        }
        
        /* 流向分析布局 */
        .flow-layout {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        .flow-container, .excel-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        #flow-sankey-chart {
            width: 100%;
            height: 300px;
        }
        .flow-metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .metric-card {
            background: linear-gradient(135deg, #f8f9ff 0%, #fff 100%);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            border: 2px solid #e0e0e0;
        }
        .metric-value {
            font-size: 2em;
            font-weight: 700;
        }
        .metric-label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        .green { color: #34a853; }
        .red { color: #ea4335; }
        .blue { color: #4285f4; }
        
        /* Excel 表格 */
        .excel-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .excel-section {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }
        .excel-label {
            text-align: center;
            font-weight: 600;
            color: #667eea;
            padding: 10px;
            background: #f5f5f5;
            border-bottom: 1px solid #e0e0e0;
        }
        .table-scroll {
            max-height: 200px;
            overflow: auto;
        }
        .excel-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }
        .excel-table th, .excel-table td {
            padding: 6px 8px;
            border: 1px solid #eee;
            text-align: left;
        }
        .excel-table th {
            background: #e8f0fe;
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        .text-right { text-align: right; }
        .text-center { text-align: center; }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.5em;
        }
        
        @media (max-width: 1400px) {
            .stats-row { grid-template-columns: repeat(4, 1fr); }
            .flow-layout { grid-template-columns: 1fr; }
        }
        @media (max-width: 1024px) {
            .charts-grid { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 物流分析仪表板 v3 - 完整测试版</h1>
        
        <div id="loading" class="loading">正在加载数据...</div>
        
        <div id="dashboard" style="display: none;">
            <!-- 筛选器 -->
            <div class="filters">
                <div class="filter-row">
                    <div class="filter-item">
                        <label>📅 时间:</label>
                        <input type="date" id="filter-date-start" value="2025-12-01">
                        <span>-</span>
                        <input type="date" id="filter-date-end" value="2025-12-31">
                    </div>
                    <div class="filter-item">
                        <label>🏭 仓库:</label>
                        <select id="filter-warehouse">
                            <option value="all">全部</option>
                            <option value="jiaxing">嘉兴仓</option>
                            <option value="us">美国仓</option>
                            <option value="uk">英国仓</option>
                            <option value="ca">加拿大仓</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>🌍 国家:</label>
                        <select id="filter-country">
                            <option value="all">全部</option>
                            <option value="US">美国</option>
                            <option value="UK">英国</option>
                            <option value="CA">加拿大</option>
                            <option value="AU">澳大利亚</option>
                            <option value="OTHER">其他</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 指标卡片 -->
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-value" id="stat-price-kg">$0.00</div>
                    <div class="stat-label">单价/KG</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-price-pkg">$0.00</div>
                    <div class="stat-label">单价/包裹</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-packages">0</div>
                    <div class="stat-label">发货包裹数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-orders">0</div>
                    <div class="stat-label">订单数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-items-pkg">0.0</div>
                    <div class="stat-label">包单件</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-weight-pkg">0.0 kg</div>
                    <div class="stat-label">每包裹重量</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-logistics-ratio">0%</div>
                    <div class="stat-label">物流占收入比</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-total-logistics">$0</div>
                    <div class="stat-label">累计物流费</div>
                </div>
            </div>

            <!-- 流向分析 + Excel -->
            <div class="flow-layout">
                <!-- 左侧：流向分析 -->
                <div class="flow-container">
                    <div class="section-title">🔀 流向分析 - 客户选择 → 实际发出</div>
                    <div id="flow-sankey-chart"></div>
                    <div class="flow-metrics">
                        <div class="metric-card">
                            <div class="metric-value green" id="metric-keep">0%</div>
                            <div class="metric-label">保持率</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value red" id="metric-downgrade">0%</div>
                            <div class="metric-label">降档率</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value blue" id="metric-upgrade">0%</div>
                            <div class="metric-label">提档率</div>
                        </div>
                    </div>
                </div>
                
                <!-- 右侧：Excel 明细表 -->
                <div class="excel-container">
                    <div class="section-title">📋 产品明细表（按国家）</div>
                    <div class="excel-wrapper">
                        <div class="excel-section">
                            <div class="excel-label">🏭 嘉兴仓 - 客户选择</div>
                            <div class="table-scroll">
                                <table class="excel-table" id="jiaxing-table">
                                    <thead>
                                        <tr>
                                            <th>运送方式</th>
                                            <th>产品</th>
                                            <th class="text-right">数量</th>
                                            <th class="text-right">占比</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </div>
                        <div class="excel-section">
                            <div class="excel-label">🌍 海外仓 - 实际发出</div>
                            <div class="table-scroll">
                                <table class="excel-table" id="overseas-table">
                                    <thead>
                                        <tr>
                                            <th>运送方式</th>
                                            <th>产品</th>
                                            <th class="text-right">数量</th>
                                            <th class="text-right">占比</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 订单结构和发货仓库占比 -->
            <div class="charts-grid">
                <div class="chart-container">
                    <div class="chart-title">📊 订单结构（订单口径）</div>
                    <div id="order-structure-chart" class="chart"></div>
                </div>
                
                <div class="chart-container">
                    <div class="chart-title">🏭 发货仓库占比（发货口径）</div>
                    <div id="warehouse-ratio-chart" class="chart"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let dashboardData = null;
        let charts = {};

        function init() {
            fetch('dashboard_data.json')
                .then(res => res.json())
                .then(data => {
                    dashboardData = data;
                    updateMetrics();
                    renderFlowSankey();
                    renderExcelTables();
                    renderOrderStructure();
                    renderWarehouseRatio();
                    
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    
                    window.addEventListener('resize', () => {
                        Object.values(charts).forEach(chart => chart.resize());
                    });
                })
                .catch(err => {
                    console.error('加载失败:', err);
                    document.getElementById('loading').textContent = '加载失败，请刷新';
                });
        }

        function updateMetrics() {
            const m = dashboardData.metrics;
            document.getElementById('stat-price-kg').textContent = '$' + m.pricePerKg.toFixed(2);
            document.getElementById('stat-price-pkg').textContent = '$' + m.pricePerPkg.toFixed(2);
            document.getElementById('stat-packages').textContent = m.totalPackages.toLocaleString();
            document.getElementById('stat-orders').textContent = m.totalOrders.toLocaleString();
            document.getElementById('stat-items-pkg').textContent = m.itemsPerPkg.toFixed(1);
            document.getElementById('stat-weight-pkg').textContent = m.weightPerPkg.toFixed(1) + ' kg';
            document.getElementById('stat-logistics-ratio').textContent = m.logisticsRatio.toFixed(1) + '%';
            document.getElementById('stat-total-logistics').textContent = '$' + m.totalLogisticsFee.toLocaleString(undefined, {maximumFractionDigits: 0});
            
            // 流向指标
            document.getElementById('metric-keep').textContent = m.flowData.metrics.keepRate + '%';
            document.getElementById('metric-downgrade').textContent = m.flowData.metrics.downgrade + '%';
            document.getElementById('metric-upgrade').textContent = m.flowData.metrics.upgrade + '%';
        }

        function renderFlowSankey() {
            charts.flow = echarts.init(document.getElementById('flow-sankey-chart'));
            const flow = dashboardData.flowData;
            
            const option = {
                tooltip: { trigger: 'item', formatter: '{a} → {b}: {c}%' },
                series: [{
                    type: 'sankey',
                    layout: 'none',
                    emphasis: { focus: 'adjacency' },
                    left: '5%', top: '5%', right: '5%', bottom: '5%',
                    nodeWidth: 20,
                    nodeGap: 40,
                    data: [
                        { name: '快线\n客户选择', value: flow.customerChoice.fast },
                        { name: '慢线\n客户选择', value: flow.customerChoice.slow },
                        { name: '快线\n实际发出', value: flow.actualShip.fast },
                        { name: '慢线\n实际发出', value: flow.actualShip.slow }
                    ],
                    links: flow.flows.map(f => ({
                        source: f.from === 'fast' ? '快线\n客户选择' : '慢线\n客户选择',
                        target: f.to === 'fast' ? '快线\n实际发出' : '慢线\n实际发出',
                        value: parseFloat(f.value)
                    })),
                    lineStyle: { color: 'source', opacity: 0.6, curveness: 0.5 },
                    label: { fontSize: 10, formatter: '{b}' }
                }]
            };
            charts.flow.setOption(option);
        }

        function renderExcelTables() {
            const data = dashboardData.productDataByCountry;
            
            // 嘉兴仓表格
            const jiaxingBody = document.querySelector('#jiaxing-table tbody');
            let jiaxingHtml = '';
            const jiaxingData = data['美国'].customerChoice.slice(0, 10);
            jiaxingData.forEach(row => {
                jiaxingHtml += `<tr>
                    <td>${row.shipping}</td>
                    <td>${row.level2}</td>
                    <td class="text-right">${row.qty}</td>
                    <td class="text-right">${row.ratio.toFixed(1)}%</td>
                </tr>`;
            });
            jiaxingBody.innerHTML = jiaxingHtml;
            
            // 海外仓表格
            const overseasBody = document.querySelector('#overseas-table tbody');
            let overseasHtml = '';
            const overseasData = data['美国'].actualShip.slice(0, 10);
            overseasData.forEach(row => {
                overseasHtml += `<tr>
                    <td>${row.shipping}</td>
                    <td>${row.level2}</td>
                    <td class="text-right">${row.qty}</td>
                    <td class="text-right">${row.ratio.toFixed(1)}%</td>
                </tr>`;
            });
            overseasBody.innerHTML = overseasHtml;
        }

        function renderOrderStructure() {
            charts.orderStructure = echarts.init(document.getElementById('order-structure-chart'));
            const data = dashboardData.orderStructure;
            
            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    formatter: params => {
                        const item = data.find(d => d.country === params[0].name);
                        return `<strong>${item.country}</strong><br/>` +
                            `全部发货：${item._numbers.full} 单<br/>` +
                            `部分发货：${item._numbers.partial} 单<br/>` +
                            `未发货：${item._numbers.unshipped} 单`;
                    }
                },
                legend: { data: ['全部发货', '部分发货', '未发货'], bottom: 0, textStyle: { fontSize: 10 } },
                grid: { left: '3%', right: '4%', bottom: '15%', top: '10%', containLabel: true },
                xAxis: { type: 'value', max: 100, axisLabel: { formatter: '{value}%' } },
                yAxis: { type: 'category', data: data.map(d => d.country).reverse() },
                series: [
                    { name: '全部发货', type: 'bar', stack: 'total', data: data.map(d => d.full).reverse(), itemStyle: { color: '#4285f4' }, label: { show: true, position: 'inside', formatter: '{c}%', color: '#fff', fontSize: 9 } },
                    { name: '部分发货', type: 'bar', stack: 'total', data: data.map(d => d.partial).reverse(), itemStyle: { color: '#ea4335' }, label: { show: true, position: 'inside', formatter: '{c}%', color: '#fff', fontSize: 9 } },
                    { name: '未发货', type: 'bar', stack: 'total', data: data.map(d => d.unshipped).reverse(), itemStyle: { color: '#9b59b6' }, label: { show: true, position: 'inside', formatter: '{c}%', color: '#fff', fontSize: 9 } }
                ]
            };
            charts.orderStructure.setOption(option);
        }

        function renderWarehouseRatio() {
            charts.warehouseRatio = echarts.init(document.getElementById('warehouse-ratio-chart'));
            const data = dashboardData.warehouseRatio;
            
            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    formatter: params => {
                        const item = data.find(d => d.country === params[0].name);
                        return `<strong>${item.country}</strong><br/>` +
                            `嘉兴仓：${item._numbers.jiaxing} 单<br/>` +
                            `海外仓：${item._numbers.overseas} 单`;
                    }
                },
                legend: { data: ['嘉兴仓', '海外仓'], bottom: 0, textStyle: { fontSize: 10 } },
                grid: { left: '3%', right: '4%', bottom: '15%', top: '10%', containLabel: true },
                xAxis: { type: 'value', max: 100, axisLabel: { formatter: '{value}%' } },
                yAxis: { type: 'category', data: data.map(d => d.country).reverse() },
                series: [
                    { name: '嘉兴仓', type: 'bar', stack: 'total', data: data.map(d => d.jiaxing).reverse(), itemStyle: { color: '#4285f4' }, label: { show: true, position: 'inside', formatter: '{c}%', color: '#fff', fontSize: 9 } },
                    { name: '海外仓', type: 'bar', stack: 'total', data: data.map(d => d.overseas).reverse(), itemStyle: { color: '#ea4335' }, label: { show: true, position: 'inside', formatter: '{c}%', color: '#fff', fontSize: 9 } }
                ]
            };
            charts.warehouseRatio.setOption(option);
        }

        init();
    </script>
</body>
</html>
